version: "2"

run:
  timeout: 5m

linters:
  enable:
    - errcheck
    - govet
    - staticcheck
    - unused
    - ineffassign
    - misspell
    - unconvert
  exclusions:
    paths:
      - testdata
      - benchmark
      - examples
      - tests

formatters:
  enable:
    - gofmt
    - goimports
  exclusions:
    paths:
      - testdata
