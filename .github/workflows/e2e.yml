name: E2E Tests

permissions:
  contents: read

on:
  workflow_dispatch:
  pull_request:
    branches: [main]
    paths:
      - 'cmd/**'
      - 'pkg/**'
      - 'tests/e2e/**'
      - '.github/workflows/e2e.yml'

jobs:
  e2e:
    name: CLI End-to-End Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.24'
          cache: false

      - name: Build seaportal binary
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -o tests/e2e/runner/seaportal ./cmd/seaportal

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Run E2E tests
        working-directory: tests/e2e
        run: |
          docker compose up \
            --build \
            --abort-on-container-exit \
            --exit-code-from runner

      - name: Copy results from container
        if: always()
        working-directory: tests/e2e
        run: |
          docker compose cp runner:/results ./results || true

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-results
          path: tests/e2e/results/
          retention-days: 7

      - name: Show logs on failure
        if: failure()
        working-directory: tests/e2e
        run: |
          echo "=== Runner Logs ==="
          docker compose logs runner || true
          echo "=== Fixtures Logs ==="
          docker compose logs fixtures || true
