name: Release

# Automatic release pipeline triggered on tag push (v0.1.0, etc.)
#
# Pipeline:
#   1. Checkout tag
#   2. Build Go binary + create GitHub release (goreleaser)
#   3. Publish npm package (with postinstall binary download support)
#
# Secrets required:
#   - NPM_TOKEN: npm authentication (https://docs.npmjs.com/creating-and-viewing-access-tokens)
#   - GITHUB_TOKEN: Automatic (GitHub Actions)
#
# To create a release:
#   git tag v0.1.0
#   git push origin v0.1.0

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v0.1.0)'
        required: true

permissions:
  contents: write

jobs:
  release:
    name: Release Binaries
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.event.inputs.tag || github.ref }}

      - uses: actions/setup-go@v6
        with:
          go-version: '1.24'

      - uses: goreleaser/goreleaser-action@v6
        with:
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  npm:
    name: Publish to npm
    runs-on: ubuntu-latest
    needs: release
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Extract version
        id: version
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          VERSION=${TAG#v}  # Remove 'v' prefix
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Update npm package version
        working-directory: npm
        run: |
          CURRENT=$(jq -r .version package.json)
          DESIRED=${{ steps.version.outputs.version }}
          if [ "$CURRENT" != "$DESIRED" ]; then
            npm version "$DESIRED" --no-git-tag-version
          else
            echo "Version already correct: $CURRENT"
          fi

      - name: Publish to npm
        working-directory: npm
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
