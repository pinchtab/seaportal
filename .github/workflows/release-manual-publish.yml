name: Release / Manual Publish

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing tag to publish (e.g. v0.1.0)'
        required: true

permissions:
  contents: read

jobs:
  validate:
    name: Validate Tag Exists
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
      ref: ${{ steps.meta.outputs.ref }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - id: meta
        run: |
          TAG="${{ inputs.tag }}"
          [ "${TAG#v}" = "$TAG" ] && TAG="v$TAG"
          git fetch --tags origin
          git rev-parse -q --verify "refs/tags/$TAG" >/dev/null || { echo "tag not found" >&2; exit 1; }
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "ref=refs/tags/$TAG" >> "$GITHUB_OUTPUT"

  approval:
    needs: validate
    runs-on: ubuntu-latest
    environment: release-approval
    steps:
      - run: echo "Approved"

  publish:
    needs: [validate, approval]
    permissions:
      contents: write
    uses: ./.github/workflows/reusable-release-publish.yml
    with:
      ref: ${{ needs.validate.outputs.ref }}
      tag: ${{ needs.validate.outputs.tag }}
    secrets: inherit
