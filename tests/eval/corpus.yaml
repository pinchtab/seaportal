# regression: classifier-round-2-fallback — fixtures added 2026-05-17 to
# pin the three observed mis-classification clusters from the round-2 task:
#   1. SSR news thinly extracted (TheHindu) — extractor pulls 2 paragraphs
#      from a 334KB body; with the round-2 fallback honest, the page now
#      lands as `static` (medium-conf, fallback-static, no-positive-signals)
#      instead of the misleading `dynamic`. Better than a needs-browser
#      false alarm; future extractor work can promote it to `ssr`.
#   2. SPA-with-real-content (synthetic Discourse/MkDocs-shaped page) →
#      `hydrated` via the new spa-bootstrap-with-real-content downgrade.
#   3. CDN JS-challenge served at 403 (Economist Cloudflare) → `blocked`
#      via the existing DetectBlocked head patterns; DetectJSChallenge
#      covers shorter same-shape responses outside DetectBlocked's net.
- path: testdata/blocked/economist-cf-challenge.html
  must_include: []
  must_exclude:
    - "Subscribe"
    - "leaders"
  expect_class: blocked
  expect_lang: en

- path: testdata/hydrated/spa-with-real-content.html
  must_include:
    - "Synthetic Hydrated"
    - "hydrated"
  must_exclude:
    - "Subscribe"
  expect_class: hydrated
  expect_lang: en

- path: testdata/dynamic/thehindu-thin-extract.html
  must_include: []
  must_exclude:
    - "Subscribe"
    - "Cookie consent"
  expect_class: static
  expect_lang: en

- path: testdata/blocked/cloudflare-js-challenge.html
  must_include: []
  must_exclude:
    - "Subscribe"
    - "Sign up"
  expect_class: blocked
  expect_lang: en
