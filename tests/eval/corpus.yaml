# SeaPortal extraction quality corpus.
#
# One entry per HTML fixture under testdata/*.html and testdata/blocked/*.html.
# Paths are repo-relative. Schema is defined by internal/engine/eval_corpus.go
# (CorpusEntry). A scorer/runner that exercises each entry is a separate
# backlog item — this file is the static contract.
#
# Field reference:
#   path:         repo-relative HTML fixture
#   must_include: substrings that MUST appear in the extracted Markdown
#   must_exclude: substrings that MUST NOT survive extraction
#   expect_class: one of static|ssr|hydrated|spa|dynamic|blocked
#   expect_lang:  BCP-47 language tag; omit (empty) when undefined

# ── testdata/*.html ─────────────────────────────────────────────────────

- path: testdata/static/article-ldjson.html
  must_include:
    - "Demo Article"
    - "Lorem ipsum"
    - "second paragraph"
  must_exclude:
    - "Subscribe"
    - "Cookie"
    - "Sign up"
  expect_class: static
  expect_lang: en

