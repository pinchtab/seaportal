  # Relabel 2026-05-17: logged-out Bluesky returns a near-empty SPA shell
  # (H=0,P=0,Len=236). It is server-shipped HTML, but indistinguishable from
  # a dynamic page without per-request content; honest call is `dynamic`.
  expect_class: dynamic
