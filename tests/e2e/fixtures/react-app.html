<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>React App</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    .hidden { display: none; }
    .tab-active { font-weight: bold; border-bottom: 2px solid #333; }
    .card { border: 1px solid #ddd; padding: 12px; margin: 8px 0; border-radius: 4px; }
    faq-section { display: block; margin: 16px 0; }
  </style>
</head>
<body>
  <noscript>You need to enable JavaScript to run this app.</noscript>
  <div id="root"></div>
  <script>
    function h(tag, props, ...children) {
      const el = document.createElement(tag);
      if (props) Object.entries(props).forEach(([k, v]) => {
        if (k.startsWith('on')) el.addEventListener(k.slice(2).toLowerCase(), v);
        else if (k === 'className') el.className = v;
        else el.setAttribute(k, v);
      });
      children.flat().forEach(c =>
        el.appendChild(typeof c === 'string' ? document.createTextNode(c) : c)
      );
      return el;
    }

    // App state
    const state = {
      count: 0,
      activeTab: 'about',
      asyncLoaded: false,
      asyncData: null,
      testimonialsLoaded: false,
      testimonials: null,
      faqLoaded: false,
      useCasesVisible: false,
      useCases: null,
      roadmapLoaded: false,
      roadmap: null,
      recommendationsLoaded: false,
      recommendations: null,
      userVisits: 0,
      partnersLoaded: false,
      partners: null,
      caseStudiesLoaded: false,
      caseStudies: null
    };

    // Simulated async data fetch — wave 1 (500ms)
    setTimeout(() => {
      state.asyncData = {
        articles: [
          { title: 'Understanding Neural Networks', summary: 'A deep dive into how artificial neural networks process information and learn patterns from data.' },
          { title: 'The Future of Renewable Energy', summary: 'Solar and wind power are reshaping the global energy landscape, with costs dropping by 90% in the last decade.' },
          { title: 'Ocean Conservation Efforts', summary: 'Marine biologists are developing new strategies to protect coral reefs and reduce plastic pollution in our oceans.' }
        ],
        stats: { users: 12847, articles: 342, comments: 8921 }
      };
      state.asyncLoaded = true;
      render();
    }, 500);

    // Simulated async data fetch — wave 2 (1.5s)
    setTimeout(() => {
      state.testimonials = [
        { name: 'Sarah Chen', role: 'ML Engineer at DeepMind', text: 'SeaPortal has become an essential part of our data pipeline. It handles JavaScript-heavy pages that other tools simply cannot parse.' },
        { name: 'Marcus Weber', role: 'CTO at DataFlow', text: 'We switched from three different scraping tools to SeaPortal. The accessibility tree feature alone saved us hundreds of engineering hours.' },
        { name: 'Amira Okafor', role: 'Research Scientist', text: 'The experimental rendering mode is a game changer. We can now extract structured data from React dashboards automatically.' }
      ];
      state.testimonialsLoaded = true;
      render();
    }, 1500);

    // Wave 3 (2.5s): computed pricing built from JS logic — invisible without execution
    setTimeout(() => {
      const base = 29;
      const tiers = ['Starter', 'Professional', 'Enterprise'];
      const multipliers = [1, 3, 8];
      state.pricing = tiers.map((name, i) => ({
        name,
        price: base * multipliers[i],
        features: [
          `${(i + 1) * 1000} pages/month`,
          `${i === 0 ? 'Community' : i === 1 ? 'Priority' : 'Dedicated'} support`,
          i > 0 ? 'API access' : null,
          i > 1 ? 'Custom integrations' : null
        ].filter(Boolean)
      }));
      state.pricingLoaded = true;
      render();
    }, 2500);

    // Wave 4 (3s): Shadow DOM FAQ component — content hidden from regular DOM traversal
    class FaqSection extends HTMLElement {
      constructor() {
        super();
        this.attachShadow({ mode: 'open' });
      }
      connectedCallback() {
        const faqs = [
          { q: 'How does SeaPortal handle JavaScript-rendered content?', a: 'SeaPortal uses a headless browser engine to fully execute JavaScript, waiting for dynamic content to load before extraction. It detects network idle and DOM stability to ensure all async content is captured.' },
          { q: 'Can I extract content from pages behind authentication?', a: 'Yes. SeaPortal supports cookie injection and session management, allowing you to extract content from authenticated pages. Enterprise plans include built-in credential vaulting.' },
          { q: 'What makes the accessibility tree approach unique?', a: 'Unlike raw HTML parsing, our accessibility tree extraction captures the semantic meaning of content as perceived by assistive technologies. This provides cleaner, more structured output ideal for AI processing.' }
        ];
        this.shadowRoot.innerHTML = `
          <style>
            :host { display: block; }
            .faq-item { border-left: 3px solid #0066cc; padding: 8px 12px; margin: 12px 0; background: #f9f9f9; }
            .question { font-weight: bold; color: #333; margin-bottom: 4px; }
            .answer { color: #555; line-height: 1.5; }
          </style>
          <h2>Frequently Asked Questions</h2>
          ${faqs.map(f => `
            <div class="faq-item">
              <div class="question">${f.q}</div>
              <div class="answer">${f.a}</div>
            </div>
          `).join('')}
        `;
      }
    }
    customElements.define('faq-section', FaqSection);

    setTimeout(() => {
      state.faqLoaded = true;
      render();
    }, 3000);

    // Wave 5: IntersectionObserver lazy section — content only loads when scrolled into view
    function setupLazyUseCases() {
      const sentinel = document.getElementById('use-cases-sentinel');
      if (!sentinel || state.useCases) return;

      const observer = new IntersectionObserver((entries) => {
        if (entries[0].isIntersecting) {
          observer.disconnect();
          // Simulate fetching use case data
          state.useCases = [
            { title: 'AI Training Data', desc: 'Extract clean text from thousands of web pages to build high-quality training datasets. SeaPortal removes boilerplate and navigation, leaving only meaningful content.' },
            { title: 'Competitive Intelligence', desc: 'Monitor competitor websites for pricing changes, new product launches, and content updates. Our smart diffing highlights what changed since your last extraction.' },
            { title: 'Academic Research', desc: 'Gather structured data from journal abstracts, conference proceedings, and research portals. Export to CSV, JSON, or directly to your data analysis pipeline.' },
            { title: 'E-commerce Aggregation', desc: 'Build price comparison tools by extracting product data from multiple retailers. Handle infinite scroll, lazy-loaded images, and dynamic filters automatically.' }
          ];
          state.useCasesVisible = true;
          render();
        }
      }, { threshold: 0.1 });

      observer.observe(sentinel);
    }

    const tabs = {
      about: {
        title: 'About Us',
        content: 'SeaPortal is an open-source tool for extracting clean, readable content from any web page. Built with Go, it handles everything from simple blogs to complex single-page applications. Our mission is to make web content accessible to AI agents and automation tools.'
      },
      features: {
        title: 'Features',
        items: [
          'Automatic SPA detection and handling',
          'Accessibility tree extraction with element refs',
          'Smart content deduplication',
          'Compact output format for token efficiency',
          'Interactive element filtering'
        ]
      },
      contact: {
        title: 'Get in Touch',
        content: 'Have questions or feedback? We would love to hear from you. Reach out through our GitHub repository or join our community Discord server. Our team typically responds within 24 hours.'
      }
    };

    function render() {
      const root = document.getElementById('root');
      root.innerHTML = '';

      const tabButtons = Object.keys(tabs).map(key =>
        h('button', {
          className: state.activeTab === key ? 'tab-active' : '',
          onClick: () => { state.activeTab = key; render(); }
        }, tabs[key].title)
      );

      const activeContent = tabs[state.activeTab];
      let tabContent;
      if (state.activeTab === 'features') {
        tabContent = h('div', null,
          h('ul', null, ...activeContent.items.map(item => h('li', null, item)))
        );
      } else {
        tabContent = h('p', null, activeContent.content);
      }

      const asyncSection = state.asyncLoaded
        ? h('section', { 'aria-label': 'Latest Articles' },
            h('h2', null, 'Latest Articles'),
            ...state.asyncData.articles.map(a =>
              h('div', { className: 'card' },
                h('h3', null, a.title),
                h('p', null, a.summary)
              )
            ),
            h('div', { className: 'card' },
              h('h3', null, 'Community Stats'),
              h('p', null, `${state.asyncData.stats.users.toLocaleString()} users, ${state.asyncData.stats.articles} articles, ${state.asyncData.stats.comments.toLocaleString()} comments`)
            )
          )
        : h('p', null, 'Loading articles...');

      const testimonialSection = state.testimonialsLoaded
        ? h('section', { 'aria-label': 'Testimonials' },
            h('h2', null, 'What People Are Saying'),
            ...state.testimonials.map(t =>
              h('blockquote', { className: 'card' },
                h('p', null, '"' + t.text + '"'),
                h('footer', null, h('strong', null, t.name), ' — ' + t.role)
              )
            )
          )
        : h('p', null, 'Loading testimonials...');

      const pricingSection = state.pricingLoaded
        ? h('section', { 'aria-label': 'Pricing' },
            h('h2', null, 'Pricing'),
            h('p', null, 'Choose the plan that fits your extraction needs. All plans include a 14-day free trial.'),
            ...state.pricing.map(tier =>
              h('div', { className: 'card' },
                h('h3', null, tier.name),
                h('p', null, '$' + tier.price + '/month'),
                h('ul', null, ...tier.features.map(f => h('li', null, f)))
              )
            )
          )
        : h('p', null, '');

      const faqSection = state.faqLoaded
        ? document.createElement('faq-section')
        : h('p', null, '');

      const useCasesSection = state.useCasesVisible && state.useCases
        ? h('section', { 'aria-label': 'Use Cases' },
            h('h2', null, 'Use Cases'),
            h('p', null, 'See how teams around the world use SeaPortal to power their data workflows.'),
            ...state.useCases.map(uc =>
              h('div', { className: 'card' },
                h('h3', null, uc.title),
                h('p', null, uc.desc)
              )
            )
          )
        : h('div', { id: 'use-cases-sentinel', style: 'min-height: 50px;' },
            h('p', null, 'Scroll to load use cases...')
          );

      const roadmapSection = state.roadmapLoaded && state.roadmap
        ? h('section', { 'aria-label': 'Product Roadmap' },
            h('h2', null, 'Product Roadmap'),
            h('p', null, 'Our vision for SeaPortal over the coming year. We build in public and welcome community input.'),
            ...state.roadmap.map(item =>
              h('div', { className: 'card' },
                h('h3', null, item.milestone),
                h('p', null, h('strong', null, item.quarter), ' — ', h('em', null, item.status)),
                h('p', null, item.desc)
              )
            )
          )
        : h('p', null, '');

      const recommendationsSection = state.recommendationsLoaded && state.recommendations
        ? h('section', { 'aria-label': 'Personalized Recommendations' },
            h('h2', null, 'Recommended For You'),
            h('p', null, 'Based on your ' + state.userVisits + ' visits, here are resources tailored to your interests.'),
            ...state.recommendations.map(rec =>
              h('div', { className: 'card' },
                h('h3', null, rec.title),
                h('p', null, rec.desc)
              )
            )
          )
        : h('p', null, '');

      const partnersSection = state.partnersLoaded && state.partners
        ? h('section', { 'aria-label': 'Integration Partners' },
            h('h2', null, 'Integration Partners'),
            h('p', null, 'SeaPortal connects seamlessly with your existing infrastructure. Our verified integration partners ensure reliable data flow from extraction to action.'),
            ...state.partners.map(partner =>
              h('div', { className: 'card' },
                h('h3', null, partner.name),
                h('p', null, h('strong', null, partner.category)),
                h('p', null, partner.desc)
              )
            )
          )
        : h('p', null, '');

      const caseStudiesSection = state.caseStudiesLoaded && state.caseStudies
        ? h('section', { 'aria-label': 'Customer Case Studies' },
            h('h2', null, 'Customer Case Studies'),
            h('p', null, 'Real-world success stories from organizations that transformed their data workflows with SeaPortal.'),
            ...state.caseStudies.map(study =>
              h('div', { className: 'card' },
                h('h3', null, study.company),
                h('p', null, h('strong', null, 'Industry: '), study.industry),
                h('p', null, h('strong', null, 'Challenge: '), study.challenge),
                h('p', null, h('strong', null, 'Solution: '), study.solution),
                h('p', null, h('strong', null, 'Results: '), study.results),
                h('blockquote', null, '"', study.quote, '"')
              )
            )
          )
        : h('p', null, '');

      root.appendChild(
        h('div', { className: 'app' },
          h('header', null,
            h('nav', { 'aria-label': 'Main' },
              h('a', { href: '/' }, 'Home'),
              h('a', { href: '/about' }, 'About'),
              h('a', { href: '/contact' }, 'Contact')
            )
          ),
          h('main', null,
            h('h1', null, 'Welcome to SeaPortal'),
            h('p', null, 'The intelligent web content extraction tool designed for the age of AI agents and automation.'),
            h('div', { 'role': 'tablist' }, ...tabButtons),
            h('div', { 'role': 'tabpanel' }, tabContent),
            asyncSection,
            testimonialSection,
            pricingSection,
            faqSection,
            useCasesSection,
            roadmapSection,
            recommendationsSection,
            partnersSection,
            caseStudiesSection,
            h('div', null,
              h('button', { onClick: () => { state.count++; render(); } }, 'Likes: ' + state.count),
              h('form', null,
                h('input', { type: 'text', placeholder: 'Search articles...' }),
                h('button', { type: 'submit' }, 'Search')
              )
            )
          ),
          h('footer', null,
            h('p', null, 'Built with passion by the SeaPortal team. Open source under the MIT License.'),
            h('p', null, 'Copyright 2026 Pinchtab. All rights reserved.')
          )
        )
      );

      // Re-setup lazy observer after each render
      setTimeout(setupLazyUseCases, 0);
    }
    render();
    
    // Setup lazy loading after initial render
    setTimeout(setupLazyUseCases, 100);

    // Wave 6: requestAnimationFrame-based rendering — requires frame execution
    (function loadRoadmapViaRAF() {
      let frameCount = 0;
      const targetFrames = 60; // ~1 second at 60fps

      function rafStep() {
        frameCount++;
        if (frameCount >= targetFrames) {
          // Build roadmap data only after enough frames have passed
          const quarters = ['Q1', 'Q2', 'Q3', 'Q4'];
          const year = 2026;
          state.roadmap = [
            { quarter: quarters[0] + ' ' + year, milestone: 'Browser Extension Launch', status: 'completed', desc: 'Released Chrome and Firefox extensions for one-click content extraction with visual element selection.' },
            { quarter: quarters[1] + ' ' + year, milestone: 'API v2 Release', status: 'in-progress', desc: 'New GraphQL API with streaming responses, batch processing, and improved rate limiting for enterprise users.' },
            { quarter: quarters[2] + ' ' + year, milestone: 'Mobile SDK', status: 'planned', desc: 'Native iOS and Android SDKs enabling on-device content extraction for offline-capable mobile applications.' },
            { quarter: quarters[3] + ' ' + year, milestone: 'AI Integration Hub', status: 'planned', desc: 'Direct integrations with OpenAI, Anthropic, and Google AI platforms for seamless content-to-model pipelines.' }
          ];
          state.roadmapLoaded = true;
          render();
        } else {
          requestAnimationFrame(rafStep);
        }
      }
      requestAnimationFrame(rafStep);
    })();

    // Wave 7: localStorage-based personalized recommendations — requires JS to write+read storage
    (function loadPersonalizedContent() {
      setTimeout(() => {
        // Simulate a returning user by storing profile data
        const profileData = {
          interests: ['machine-learning', 'web-scraping', 'automation'],
          visitCount: 7,
          lastVisit: new Date().toISOString()
        };
        localStorage.setItem('seaportal_user_profile', JSON.stringify(profileData));
        
        // Build recommendations based on stored profile
        const storedProfile = JSON.parse(localStorage.getItem('seaportal_user_profile'));
        if (storedProfile && storedProfile.interests) {
          const recommendationMap = {
            'machine-learning': { title: 'ML Data Pipelines', desc: 'Learn how SeaPortal integrates with popular ML frameworks like PyTorch and TensorFlow. Our structured output format maps directly to training data schemas, reducing preprocessing time by up to 80%.' },
            'web-scraping': { title: 'Advanced Extraction Patterns', desc: 'Master complex extraction scenarios including infinite scroll pagination, lazy-loaded images, and dynamically-generated content. Our cookbook includes 50+ real-world examples.' },
            'automation': { title: 'CI/CD Integration Guide', desc: 'Run SeaPortal as part of your deployment pipeline. Monitor content changes, validate data freshness, and trigger alerts when critical information updates.' }
          };
          
          state.recommendations = storedProfile.interests
            .filter(i => recommendationMap[i])
            .map(i => recommendationMap[i]);
          state.userVisits = storedProfile.visitCount;
          state.recommendationsLoaded = true;
          render();
        }
      }, 3500);
    })();

    // Wave 8: MutationObserver-triggered content — only appears after detecting DOM stability
    (function loadPartnerContentViaMutation() {
      let mutationCount = 0;
      const targetMutations = 5; // Wait for several DOM mutations before revealing

      const observer = new MutationObserver((mutations) => {
        mutationCount += mutations.length;
        if (mutationCount >= targetMutations) {
          observer.disconnect();
          // Now inject partner integration data that was "waiting" for DOM stability
          state.partners = [
            { name: 'Vercel', category: 'Deployment', desc: 'Deploy SeaPortal as serverless functions on Vercel\'s edge network. Automatic scaling handles burst traffic during large extraction jobs, with cold start times under 50 milliseconds.' },
            { name: 'Supabase', category: 'Database', desc: 'Store extracted content directly in Supabase PostgreSQL with automatic vector embeddings. Full-text search and real-time subscriptions enable instant content monitoring dashboards.' },
            { name: 'Temporal', category: 'Orchestration', desc: 'Build reliable extraction workflows with Temporal\'s durable execution engine. Automatic retries, timeouts, and state persistence ensure no data is lost even during infrastructure failures.' },
            { name: 'Grafana', category: 'Observability', desc: 'Monitor extraction metrics with pre-built Grafana dashboards. Track success rates, latency percentiles, and content volume across all your data sources in real time.' }
          ];
          state.partnersLoaded = true;
          render();
        }
      });

      // Start observing the document for any DOM changes
      observer.observe(document.body, {
        childList: true,
        subtree: true,
        attributes: true
      });
    })();

    // Wave 9: IndexedDB-sourced content — requires full DB transaction lifecycle
    (function loadCaseStudiesFromIndexedDB() {
      const dbName = 'SeaPortalCaseStudiesDB';
      const storeName = 'caseStudies';
      const dbVersion = 1;

      const caseStudyData = [
        {
          id: 1,
          company: 'Meridian Analytics',
          industry: 'Financial Services',
          challenge: 'Extracting real-time market sentiment from 200+ news sources with heavy JavaScript rendering and paywalls.',
          solution: 'Deployed SeaPortal with custom authentication handlers and parallel extraction workers across a Kubernetes cluster.',
          results: 'Reduced data latency from 45 minutes to under 3 minutes. Sentiment accuracy improved 34% by capturing previously missed dynamic content.',
          quote: 'SeaPortal transformed our competitive intelligence pipeline. We now detect market-moving news before our competitors even know it exists.'
        },
        {
          id: 2,
          company: 'HealthBridge Research',
          industry: 'Healthcare',
          challenge: 'Building a comprehensive database of clinical trial results from hospital portals using legacy React applications with complex authentication.',
          solution: 'Used SeaPortal accessibility tree extraction to navigate nested iframes and dynamically-loaded trial data with session persistence.',
          results: 'Catalogued over 12,000 clinical trials across 150 institutions. Research teams saved an estimated 2,400 hours of manual data entry annually.',
          quote: 'The accessibility tree approach was a revelation. We extracted structured data from interfaces that were designed for human eyes only.'
        },
        {
          id: 3,
          company: 'EduPath Global',
          industry: 'Education Technology',
          challenge: 'Aggregating course content and pricing from 80+ online learning platforms to power a course recommendation engine.',
          solution: 'Implemented SeaPortal with intelligent scroll detection to handle infinite-loading course catalogs and real-time pricing widgets.',
          results: 'Database now contains 450,000+ courses with weekly freshness. User engagement increased 28% with accurate, up-to-date recommendations.',
          quote: 'Other tools gave us partial data. SeaPortal gives us everything—descriptions, prerequisites, reviews, even dynamic pricing tiers.'
        }
      ];

      const request = indexedDB.open(dbName, dbVersion);

      request.onupgradeneeded = (event) => {
        const db = event.target.result;
        if (!db.objectStoreNames.contains(storeName)) {
          const store = db.createObjectStore(storeName, { keyPath: 'id' });
          store.createIndex('industry', 'industry', { unique: false });
          // Populate initial data during upgrade
          caseStudyData.forEach(study => store.put(study));
        }
      };

      request.onsuccess = (event) => {
        const db = event.target.result;
        
        // Small delay to ensure data is written, then read back
        setTimeout(() => {
          const transaction = db.transaction(storeName, 'readonly');
          const store = transaction.objectStore(storeName);
          const getAllRequest = store.getAll();

          getAllRequest.onsuccess = () => {
            const studies = getAllRequest.result;
            if (studies && studies.length > 0) {
              state.caseStudies = studies;
              state.caseStudiesLoaded = true;
              render();
            }
          };

          transaction.oncomplete = () => {
            db.close();
          };
        }, 500);
      };

      request.onerror = (event) => {
        console.error('IndexedDB error:', event.target.error);
      };
    })();
  </script>
</body>
</html>
