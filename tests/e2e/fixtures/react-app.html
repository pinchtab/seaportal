<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>React App</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    .hidden { display: none; }
    .tab-active { font-weight: bold; border-bottom: 2px solid #333; }
    .card { border: 1px solid #ddd; padding: 12px; margin: 8px 0; border-radius: 4px; }
    faq-section { display: block; margin: 16px 0; }
    @keyframes spotlightReveal {
      0% { opacity: 0; transform: translateY(20px); }
      100% { opacity: 1; transform: translateY(0); }
    }
    .spotlight-container { animation: spotlightReveal 0.8s ease-out forwards; }
    .spotlight-pending { visibility: hidden; height: 0; overflow: hidden; }
  </style>
</head>
<body>
  <noscript>You need to enable JavaScript to run this app.</noscript>
  <div id="root"></div>
  <script>
    function h(tag, props, ...children) {
      const el = document.createElement(tag);
      if (props) Object.entries(props).forEach(([k, v]) => {
        if (k.startsWith('on')) el.addEventListener(k.slice(2).toLowerCase(), v);
        else if (k === 'className') el.className = v;
        else el.setAttribute(k, v);
      });
      children.flat().forEach(c =>
        el.appendChild(typeof c === 'string' ? document.createTextNode(c) : c)
      );
      return el;
    }

    // App state
    const state = {
      count: 0,
      activeTab: 'about',
      asyncLoaded: false,
      asyncData: null,
      testimonialsLoaded: false,
      testimonials: null,
      faqLoaded: false,
      useCasesVisible: false,
      useCases: null,
      roadmapLoaded: false,
      roadmap: null,
      recommendationsLoaded: false,
      recommendations: null,
      userVisits: 0,
      partnersLoaded: false,
      partners: null,
      caseStudiesLoaded: false,
      caseStudies: null,
      spotlightLoaded: false,
      spotlight: null,
      benchmarksLoaded: false,
      benchmarks: null,
      securityLoaded: false,
      securityInfo: null,
      ecosystemLoaded: false,
      ecosystem: null,
      architectureLoaded: false,
      architecture: null,
      infraMetricsLoaded: false,
      infraMetrics: null
    };

    // Simulated async data fetch — wave 1 (500ms)
    setTimeout(() => {
      state.asyncData = {
        articles: [
          { title: 'Understanding Neural Networks', summary: 'A deep dive into how artificial neural networks process information and learn patterns from data.' },
          { title: 'The Future of Renewable Energy', summary: 'Solar and wind power are reshaping the global energy landscape, with costs dropping by 90% in the last decade.' },
          { title: 'Ocean Conservation Efforts', summary: 'Marine biologists are developing new strategies to protect coral reefs and reduce plastic pollution in our oceans.' }
        ],
        stats: { users: 12847, articles: 342, comments: 8921 }
      };
      state.asyncLoaded = true;
      render();
    }, 500);

    // Simulated async data fetch — wave 2 (1.5s)
    setTimeout(() => {
      state.testimonials = [
        { name: 'Sarah Chen', role: 'ML Engineer at DeepMind', text: 'SeaPortal has become an essential part of our data pipeline. It handles JavaScript-heavy pages that other tools simply cannot parse.' },
        { name: 'Marcus Weber', role: 'CTO at DataFlow', text: 'We switched from three different scraping tools to SeaPortal. The accessibility tree feature alone saved us hundreds of engineering hours.' },
        { name: 'Amira Okafor', role: 'Research Scientist', text: 'The experimental rendering mode is a game changer. We can now extract structured data from React dashboards automatically.' }
      ];
      state.testimonialsLoaded = true;
      render();
    }, 1500);

    // Wave 3 (2.5s): computed pricing built from JS logic — invisible without execution
    setTimeout(() => {
      const base = 29;
      const tiers = ['Starter', 'Professional', 'Enterprise'];
      const multipliers = [1, 3, 8];
      state.pricing = tiers.map((name, i) => ({
        name,
        price: base * multipliers[i],
        features: [
          `${(i + 1) * 1000} pages/month`,
          `${i === 0 ? 'Community' : i === 1 ? 'Priority' : 'Dedicated'} support`,
          i > 0 ? 'API access' : null,
          i > 1 ? 'Custom integrations' : null
        ].filter(Boolean)
      }));
      state.pricingLoaded = true;
      render();
    }, 2500);

    // Wave 4 (3s): Shadow DOM FAQ component — content hidden from regular DOM traversal
    class FaqSection extends HTMLElement {
      constructor() {
        super();
        this.attachShadow({ mode: 'open' });
      }
      connectedCallback() {
        const faqs = [
          { q: 'How does SeaPortal handle JavaScript-rendered content?', a: 'SeaPortal uses a headless browser engine to fully execute JavaScript, waiting for dynamic content to load before extraction. It detects network idle and DOM stability to ensure all async content is captured.' },
          { q: 'Can I extract content from pages behind authentication?', a: 'Yes. SeaPortal supports cookie injection and session management, allowing you to extract content from authenticated pages. Enterprise plans include built-in credential vaulting.' },
          { q: 'What makes the accessibility tree approach unique?', a: 'Unlike raw HTML parsing, our accessibility tree extraction captures the semantic meaning of content as perceived by assistive technologies. This provides cleaner, more structured output ideal for AI processing.' }
        ];
        this.shadowRoot.innerHTML = `
          <style>
            :host { display: block; }
            .faq-item { border-left: 3px solid #0066cc; padding: 8px 12px; margin: 12px 0; background: #f9f9f9; }
            .question { font-weight: bold; color: #333; margin-bottom: 4px; }
            .answer { color: #555; line-height: 1.5; }
          </style>
          <h2>Frequently Asked Questions</h2>
          ${faqs.map(f => `
            <div class="faq-item">
              <div class="question">${f.q}</div>
              <div class="answer">${f.a}</div>
            </div>
          `).join('')}
        `;
      }
    }
    customElements.define('faq-section', FaqSection);

    setTimeout(() => {
      state.faqLoaded = true;
      render();
    }, 3000);

    // Wave 5: IntersectionObserver lazy section — content only loads when scrolled into view
    function setupLazyUseCases() {
      const sentinel = document.getElementById('use-cases-sentinel');
      if (!sentinel || state.useCases) return;

      const observer = new IntersectionObserver((entries) => {
        if (entries[0].isIntersecting) {
          observer.disconnect();
          // Simulate fetching use case data
          state.useCases = [
            { title: 'AI Training Data', desc: 'Extract clean text from thousands of web pages to build high-quality training datasets. SeaPortal removes boilerplate and navigation, leaving only meaningful content.' },
            { title: 'Competitive Intelligence', desc: 'Monitor competitor websites for pricing changes, new product launches, and content updates. Our smart diffing highlights what changed since your last extraction.' },
            { title: 'Academic Research', desc: 'Gather structured data from journal abstracts, conference proceedings, and research portals. Export to CSV, JSON, or directly to your data analysis pipeline.' },
            { title: 'E-commerce Aggregation', desc: 'Build price comparison tools by extracting product data from multiple retailers. Handle infinite scroll, lazy-loaded images, and dynamic filters automatically.' }
          ];
          state.useCasesVisible = true;
          render();
        }
      }, { threshold: 0.1 });

      observer.observe(sentinel);
    }

    const tabs = {
      about: {
        title: 'About Us',
        content: 'SeaPortal is an open-source tool for extracting clean, readable content from any web page. Built with Go, it handles everything from simple blogs to complex single-page applications. Our mission is to make web content accessible to AI agents and automation tools.'
      },
      features: {
        title: 'Features',
        items: [
          'Automatic SPA detection and handling',
          'Accessibility tree extraction with element refs',
          'Smart content deduplication',
          'Compact output format for token efficiency',
          'Interactive element filtering'
        ]
      },
      contact: {
        title: 'Get in Touch',
        content: 'Have questions or feedback? We would love to hear from you. Reach out through our GitHub repository or join our community Discord server. Our team typically responds within 24 hours.'
      }
    };

    function render() {
      const root = document.getElementById('root');
      root.innerHTML = '';

      const tabButtons = Object.keys(tabs).map(key =>
        h('button', {
          className: state.activeTab === key ? 'tab-active' : '',
          onClick: () => { state.activeTab = key; render(); }
        }, tabs[key].title)
      );

      const activeContent = tabs[state.activeTab];
      let tabContent;
      if (state.activeTab === 'features') {
        tabContent = h('div', null,
          h('ul', null, ...activeContent.items.map(item => h('li', null, item)))
        );
      } else {
        tabContent = h('p', null, activeContent.content);
      }

      const asyncSection = state.asyncLoaded
        ? h('section', { 'aria-label': 'Latest Articles' },
            h('h2', null, 'Latest Articles'),
            ...state.asyncData.articles.map(a =>
              h('div', { className: 'card' },
                h('h3', null, a.title),
                h('p', null, a.summary)
              )
            ),
            h('div', { className: 'card' },
              h('h3', null, 'Community Stats'),
              h('p', null, `${state.asyncData.stats.users.toLocaleString()} users, ${state.asyncData.stats.articles} articles, ${state.asyncData.stats.comments.toLocaleString()} comments`)
            )
          )
        : h('p', null, 'Loading articles...');

      const testimonialSection = state.testimonialsLoaded
        ? h('section', { 'aria-label': 'Testimonials' },
            h('h2', null, 'What People Are Saying'),
            ...state.testimonials.map(t =>
              h('blockquote', { className: 'card' },
                h('p', null, '"' + t.text + '"'),
                h('footer', null, h('strong', null, t.name), ' — ' + t.role)
              )
            )
          )
        : h('p', null, 'Loading testimonials...');

      const pricingSection = state.pricingLoaded
        ? h('section', { 'aria-label': 'Pricing' },
            h('h2', null, 'Pricing'),
            h('p', null, 'Choose the plan that fits your extraction needs. All plans include a 14-day free trial.'),
            ...state.pricing.map(tier =>
              h('div', { className: 'card' },
                h('h3', null, tier.name),
                h('p', null, '$' + tier.price + '/month'),
                h('ul', null, ...tier.features.map(f => h('li', null, f)))
              )
            )
          )
        : h('p', null, '');

      const faqSection = state.faqLoaded
        ? document.createElement('faq-section')
        : h('p', null, '');

      const useCasesSection = state.useCasesVisible && state.useCases
        ? h('section', { 'aria-label': 'Use Cases' },
            h('h2', null, 'Use Cases'),
            h('p', null, 'See how teams around the world use SeaPortal to power their data workflows.'),
            ...state.useCases.map(uc =>
              h('div', { className: 'card' },
                h('h3', null, uc.title),
                h('p', null, uc.desc)
              )
            )
          )
        : h('div', { id: 'use-cases-sentinel', style: 'min-height: 50px;' },
            h('p', null, 'Scroll to load use cases...')
          );

      const roadmapSection = state.roadmapLoaded && state.roadmap
        ? h('section', { 'aria-label': 'Product Roadmap' },
            h('h2', null, 'Product Roadmap'),
            h('p', null, 'Our vision for SeaPortal over the coming year. We build in public and welcome community input.'),
            ...state.roadmap.map(item =>
              h('div', { className: 'card' },
                h('h3', null, item.milestone),
                h('p', null, h('strong', null, item.quarter), ' — ', h('em', null, item.status)),
                h('p', null, item.desc)
              )
            )
          )
        : h('p', null, '');

      const recommendationsSection = state.recommendationsLoaded && state.recommendations
        ? h('section', { 'aria-label': 'Personalized Recommendations' },
            h('h2', null, 'Recommended For You'),
            h('p', null, 'Based on your ' + state.userVisits + ' visits, here are resources tailored to your interests.'),
            ...state.recommendations.map(rec =>
              h('div', { className: 'card' },
                h('h3', null, rec.title),
                h('p', null, rec.desc)
              )
            )
          )
        : h('p', null, '');

      const partnersSection = state.partnersLoaded && state.partners
        ? h('section', { 'aria-label': 'Integration Partners' },
            h('h2', null, 'Integration Partners'),
            h('p', null, 'SeaPortal connects seamlessly with your existing infrastructure. Our verified integration partners ensure reliable data flow from extraction to action.'),
            ...state.partners.map(partner =>
              h('div', { className: 'card' },
                h('h3', null, partner.name),
                h('p', null, h('strong', null, partner.category)),
                h('p', null, partner.desc)
              )
            )
          )
        : h('p', null, '');

      const caseStudiesSection = state.caseStudiesLoaded && state.caseStudies
        ? h('section', { 'aria-label': 'Customer Case Studies' },
            h('h2', null, 'Customer Case Studies'),
            h('p', null, 'Real-world success stories from organizations that transformed their data workflows with SeaPortal.'),
            ...state.caseStudies.map(study =>
              h('div', { className: 'card' },
                h('h3', null, study.company),
                h('p', null, h('strong', null, 'Industry: '), study.industry),
                h('p', null, h('strong', null, 'Challenge: '), study.challenge),
                h('p', null, h('strong', null, 'Solution: '), study.solution),
                h('p', null, h('strong', null, 'Results: '), study.results),
                h('blockquote', null, '"', study.quote, '"')
              )
            )
          )
        : h('p', null, '');

      const spotlightSection = state.spotlightLoaded && state.spotlight
        ? h('section', { 'aria-label': 'Feature Spotlight' },
            h('h2', null, 'Feature Spotlight'),
            h('p', null, 'Deep dives into capabilities that set SeaPortal apart from conventional scraping tools.'),
            ...state.spotlight.map(feature =>
              h('div', { className: 'card' },
                h('h3', null, feature.title),
                h('p', null, feature.desc),
                h('p', null, h('em', null, 'Technical detail: '), feature.technical)
              )
            )
          )
        : h('div', { id: 'spotlight-trigger', className: 'spotlight-pending' },
            h('p', null, 'Loading spotlight...')
          );

      const benchmarksSection = state.benchmarksLoaded && state.benchmarks
        ? h('section', { 'aria-label': 'Performance Benchmarks' },
            h('h2', null, 'Performance Benchmarks'),
            h('p', null, 'Real-world extraction performance measured across diverse website categories. All benchmarks conducted on standardized hardware with network latency simulation.'),
            ...state.benchmarks.map(bench =>
              h('div', { className: 'card' },
                h('h3', null, bench.category),
                h('p', null, h('strong', null, 'Sites tested: '), bench.siteCount.toLocaleString()),
                h('p', null, h('strong', null, 'Avg extraction time: '), bench.avgTime),
                h('p', null, h('strong', null, 'Success rate: '), bench.successRate),
                h('p', null, bench.analysis)
              )
            )
          )
        : h('p', null, '');

      const securitySection = state.securityLoaded && state.securityInfo
        ? h('section', { 'aria-label': 'Security & Compliance' },
            h('h2', null, 'Security & Compliance'),
            h('p', null, 'Enterprise-grade security built into every layer of the SeaPortal extraction pipeline. Trust your sensitive data workflows to infrastructure designed for regulated industries.'),
            h('h3', null, 'Certifications'),
            ...state.securityInfo.certifications.map(cert =>
              h('div', { className: 'card' },
                h('h4', null, cert.name),
                h('p', null, h('strong', null, 'Status: '), cert.status),
                h('p', null, cert.desc)
              )
            ),
            h('h3', null, 'Security Features'),
            ...state.securityInfo.securityFeatures.map(feat =>
              h('div', { className: 'card' },
                h('h4', null, feat.feature),
                h('p', null, feat.detail)
              )
            )
          )
        : h('p', null, '');

      const ecosystemSection = state.ecosystemLoaded && state.ecosystem
        ? h('section', { 'aria-label': 'Community Ecosystem' },
            h('h2', null, 'Community Ecosystem'),
            h('p', null, 'SeaPortal thrives thanks to a vibrant open-source community. Here are some of the ways developers are extending and building upon the core platform.'),
            h('h3', null, 'Community Plugins'),
            ...state.ecosystem.plugins.map(plugin =>
              h('div', { className: 'card' },
                h('h4', null, plugin.name),
                h('p', null, h('strong', null, 'Author: '), plugin.author),
                h('p', null, h('strong', null, 'Downloads: '), plugin.downloads.toLocaleString()),
                h('p', null, plugin.desc)
              )
            ),
            h('h3', null, 'Learning Resources'),
            ...state.ecosystem.resources.map(res =>
              h('div', { className: 'card' },
                h('h4', null, res.title),
                h('p', null, h('strong', null, 'Type: '), res.type),
                h('p', null, res.desc)
              )
            )
          )
        : h('p', null, '');

      const infraMetricsSection = state.infraMetricsLoaded && state.infraMetrics
        ? h('section', { 'aria-label': 'Live Infrastructure Metrics' },
            h('h2', null, 'Live Infrastructure Metrics'),
            h('p', null, 'Real-time operational data from the SeaPortal extraction network. These metrics refresh every 30 seconds and reflect current system health across all deployment regions.'),
            h('h3', null, 'Global Extraction Nodes'),
            ...state.infraMetrics.nodes.map(node =>
              h('div', { className: 'card' },
                h('h4', null, node.region),
                h('p', null, h('strong', null, 'Status: '), node.status),
                h('p', null, h('strong', null, 'Active Workers: '), node.workers.toLocaleString()),
                h('p', null, h('strong', null, 'Queue Depth: '), node.queueDepth.toLocaleString(), ' jobs'),
                h('p', null, h('strong', null, 'Avg Latency: '), node.avgLatency)
              )
            ),
            h('h3', null, 'System-Wide Statistics'),
            h('div', { className: 'card' },
              h('p', null, h('strong', null, 'Total Extractions Today: '), state.infraMetrics.stats.totalToday.toLocaleString()),
              h('p', null, h('strong', null, 'Pages Processed This Hour: '), state.infraMetrics.stats.thisHour.toLocaleString()),
              h('p', null, h('strong', null, 'Global Success Rate: '), state.infraMetrics.stats.successRate),
              h('p', null, h('strong', null, 'Chromium Instances Active: '), state.infraMetrics.stats.chromiumInstances.toLocaleString()),
              h('p', null, h('strong', null, 'Peak Throughput: '), state.infraMetrics.stats.peakThroughput, ' pages/sec')
            )
          )
        : h('p', null, '');

      const architectureSection = state.architectureLoaded && state.architecture
        ? h('section', { 'aria-label': 'System Architecture' },
            h('h2', null, 'System Architecture'),
            h('p', null, 'A deep look at how SeaPortal processes millions of extraction requests daily while maintaining sub-second latency and enterprise-grade reliability.'),
            h('h3', null, 'Architecture Layers'),
            ...state.architecture.layers.map(layer =>
              h('div', { className: 'card' },
                h('h4', null, layer.name),
                h('p', null, h('strong', null, 'Components: '), layer.components.join(', ')),
                h('p', null, layer.desc)
              )
            ),
            h('h3', null, 'Design Principles'),
            ...state.architecture.principles.map(p =>
              h('div', { className: 'card' },
                h('h4', null, p.principle),
                h('p', null, p.detail)
              )
            )
          )
        : h('p', null, '');

      root.appendChild(
        h('div', { className: 'app' },
          h('header', null,
            h('nav', { 'aria-label': 'Main' },
              h('a', { href: '/' }, 'Home'),
              h('a', { href: '/about' }, 'About'),
              h('a', { href: '/contact' }, 'Contact')
            )
          ),
          h('main', null,
            h('h1', null, 'Welcome to SeaPortal'),
            h('p', null, 'The intelligent web content extraction tool designed for the age of AI agents and automation.'),
            h('div', { 'role': 'tablist' }, ...tabButtons),
            h('div', { 'role': 'tabpanel' }, tabContent),
            asyncSection,
            testimonialSection,
            pricingSection,
            faqSection,
            useCasesSection,
            roadmapSection,
            recommendationsSection,
            partnersSection,
            caseStudiesSection,
            spotlightSection,
            benchmarksSection,
            securitySection,
            ecosystemSection,
            architectureSection,
            infraMetricsSection,
            h('div', null,
              h('button', { onClick: () => { state.count++; render(); } }, 'Likes: ' + state.count),
              h('form', null,
                h('input', { type: 'text', placeholder: 'Search articles...' }),
                h('button', { type: 'submit' }, 'Search')
              )
            )
          ),
          h('footer', null,
            h('p', null, 'Built with passion by the SeaPortal team. Open source under the MIT License.'),
            h('p', null, 'Copyright 2026 Pinchtab. All rights reserved.')
          )
        )
      );

      // Re-setup lazy observer after each render
      setTimeout(setupLazyUseCases, 0);
    }
    render();
    
    // Setup lazy loading after initial render
    setTimeout(setupLazyUseCases, 100);

    // Wave 6: requestAnimationFrame-based rendering — requires frame execution
    (function loadRoadmapViaRAF() {
      let frameCount = 0;
      const targetFrames = 60; // ~1 second at 60fps

      function rafStep() {
        frameCount++;
        if (frameCount >= targetFrames) {
          // Build roadmap data only after enough frames have passed
          const quarters = ['Q1', 'Q2', 'Q3', 'Q4'];
          const year = 2026;
          state.roadmap = [
            { quarter: quarters[0] + ' ' + year, milestone: 'Browser Extension Launch', status: 'completed', desc: 'Released Chrome and Firefox extensions for one-click content extraction with visual element selection.' },
            { quarter: quarters[1] + ' ' + year, milestone: 'API v2 Release', status: 'in-progress', desc: 'New GraphQL API with streaming responses, batch processing, and improved rate limiting for enterprise users.' },
            { quarter: quarters[2] + ' ' + year, milestone: 'Mobile SDK', status: 'planned', desc: 'Native iOS and Android SDKs enabling on-device content extraction for offline-capable mobile applications.' },
            { quarter: quarters[3] + ' ' + year, milestone: 'AI Integration Hub', status: 'planned', desc: 'Direct integrations with OpenAI, Anthropic, and Google AI platforms for seamless content-to-model pipelines.' }
          ];
          state.roadmapLoaded = true;
          render();
        } else {
          requestAnimationFrame(rafStep);
        }
      }
      requestAnimationFrame(rafStep);
    })();

    // Wave 7: localStorage-based personalized recommendations — requires JS to write+read storage
    (function loadPersonalizedContent() {
      setTimeout(() => {
        // Simulate a returning user by storing profile data
        const profileData = {
          interests: ['machine-learning', 'web-scraping', 'automation'],
          visitCount: 7,
          lastVisit: new Date().toISOString()
        };
        localStorage.setItem('seaportal_user_profile', JSON.stringify(profileData));
        
        // Build recommendations based on stored profile
        const storedProfile = JSON.parse(localStorage.getItem('seaportal_user_profile'));
        if (storedProfile && storedProfile.interests) {
          const recommendationMap = {
            'machine-learning': { title: 'ML Data Pipelines', desc: 'Learn how SeaPortal integrates with popular ML frameworks like PyTorch and TensorFlow. Our structured output format maps directly to training data schemas, reducing preprocessing time by up to 80%.' },
            'web-scraping': { title: 'Advanced Extraction Patterns', desc: 'Master complex extraction scenarios including infinite scroll pagination, lazy-loaded images, and dynamically-generated content. Our cookbook includes 50+ real-world examples.' },
            'automation': { title: 'CI/CD Integration Guide', desc: 'Run SeaPortal as part of your deployment pipeline. Monitor content changes, validate data freshness, and trigger alerts when critical information updates.' }
          };
          
          state.recommendations = storedProfile.interests
            .filter(i => recommendationMap[i])
            .map(i => recommendationMap[i]);
          state.userVisits = storedProfile.visitCount;
          state.recommendationsLoaded = true;
          render();
        }
      }, 3500);
    })();

    // Wave 8: MutationObserver-triggered content — only appears after detecting DOM stability
    (function loadPartnerContentViaMutation() {
      let mutationCount = 0;
      const targetMutations = 5; // Wait for several DOM mutations before revealing

      const observer = new MutationObserver((mutations) => {
        mutationCount += mutations.length;
        if (mutationCount >= targetMutations) {
          observer.disconnect();
          // Now inject partner integration data that was "waiting" for DOM stability
          state.partners = [
            { name: 'Vercel', category: 'Deployment', desc: 'Deploy SeaPortal as serverless functions on Vercel\'s edge network. Automatic scaling handles burst traffic during large extraction jobs, with cold start times under 50 milliseconds.' },
            { name: 'Supabase', category: 'Database', desc: 'Store extracted content directly in Supabase PostgreSQL with automatic vector embeddings. Full-text search and real-time subscriptions enable instant content monitoring dashboards.' },
            { name: 'Temporal', category: 'Orchestration', desc: 'Build reliable extraction workflows with Temporal\'s durable execution engine. Automatic retries, timeouts, and state persistence ensure no data is lost even during infrastructure failures.' },
            { name: 'Grafana', category: 'Observability', desc: 'Monitor extraction metrics with pre-built Grafana dashboards. Track success rates, latency percentiles, and content volume across all your data sources in real time.' }
          ];
          state.partnersLoaded = true;
          render();
        }
      });

      // Start observing the document for any DOM changes
      observer.observe(document.body, {
        childList: true,
        subtree: true,
        attributes: true
      });
    })();

    // Wave 9: IndexedDB-sourced content — requires full DB transaction lifecycle
    (function loadCaseStudiesFromIndexedDB() {
      const dbName = 'SeaPortalCaseStudiesDB';
      const storeName = 'caseStudies';
      const dbVersion = 1;

      const caseStudyData = [
        {
          id: 1,
          company: 'Meridian Analytics',
          industry: 'Financial Services',

          caseStudyData.forEach(study => store.put(study));
        }
      };

      request.onsuccess = (event) => {
        const db = event.target.result;
        
        // Small delay to ensure data is written, then read back
        setTimeout(() => {
          const transaction = db.transaction(storeName, 'readonly');
          const store = transaction.objectStore(storeName);
          const getAllRequest = store.getAll();

          getAllRequest.onsuccess = () => {
            const studies = getAllRequest.result;
            if (studies && studies.length > 0) {

              state.caseStudiesLoaded = true;
              render();

          };

          transaction.oncomplete = () => {

    // Wave 11: Web Worker computed content — requires worker thread execution and message passing
    (function loadBenchmarksViaWebWorker() {
      // Create worker code as a Blob — no external file needed
      const workerCode = `
        self.onmessage = function(e) {
          // Simulate computationally intensive benchmark analysis
          const categories = ['E-commerce', 'News Sites', 'Social Platforms', 'SaaS Dashboards', 'Government Portals'];
          const results = categories.map((category, idx) => {
            // Compute synthetic but realistic metrics
            const baseSites = 150 + (idx * 47);
            const baseTime = 1.2 + (idx * 0.3);
            const baseSuccess = 98.5 - (idx * 0.8);
            
            const analyses = [
              'E-commerce sites present unique challenges with infinite scroll product grids and dynamically-loaded inventory data. SeaPortal adaptive wait strategies handle even the most complex React storefronts, capturing prices, descriptions, and availability in a single pass.',
              'Modern news outlets rely heavily on client-side rendering and lazy-loaded media. Our extraction pipeline respects content boundaries, cleanly separating article text from advertising and recommendation widgets without manual configuration.',
              'Social platform extraction requires handling real-time content updates and complex threading. SeaPortal incremental mode captures only new posts while maintaining conversation context across extraction sessions.',
              'SaaS dashboards often feature custom charting libraries and WebSocket-driven data. The accessibility tree approach extracts underlying values even when visual rendering would require screenshot analysis.',
              'Government portals frequently use legacy frameworks with non-standard markup. SeaPortal heuristic engine adapts to inconsistent HTML structures, achieving high extraction rates where conventional selectors fail.'
            ];
            
            return {
              category: category,
              siteCount: baseSites,
              avgTime: baseTime.toFixed(1) + 's',
              successRate: baseSuccess.toFixed(1) + '%',
              analysis: analyses[idx]
            };
          });
          
          // Post results back to main thread
          self.postMessage({ benchmarks: results });
        };
      `;

      const blob = new Blob([workerCode], { type: 'application/javascript' });
      const workerUrl = URL.createObjectURL(blob);
      const worker = new Worker(workerUrl);

      worker.onmessage = function(e) {
        state.benchmarks = e.data.benchmarks;
        state.benchmarksLoaded = true;
        render();
        
        // Cleanup
        worker.terminate();
        URL.revokeObjectURL(workerUrl);
      };

      // Trigger the worker computation after other waves have started
      setTimeout(() => {
        worker.postMessage({ compute: true });
      }, 4500);
    })();

      function checkIdleAndLoad(deadline) {

    // Wave 14: postMessage handshake with hidden iframe — content requires cross-context coordination
    (function loadArchitectureViaIframeHandshake() {
      // Generate a cryptographic challenge for the handshake
      const challenge = Array.from(crypto.getRandomValues(new Uint8Array(16)))
        .map(b => b.toString(16).padStart(2, '0')).join('');
      
      // State machine for handshake
      let handshakeState = 'pending';
      let iframeReady = false;

      // Content that will be delivered via the iframe handshake
      const architectureContent = {
        layers: [
          {
            name: 'Ingestion Layer',
            components: ['URL Queue Manager', 'Priority Scheduler', 'Rate Limiter'],
            desc: 'The ingestion layer handles incoming extraction requests, managing priorities based on freshness requirements and respecting target site rate limits. Distributed queue ensures fault tolerance and horizontal scalability.'
          },
          {
            name: 'Rendering Layer',
            components: ['Chromium Pool', 'Context Isolator', 'Resource Interceptor'],
            desc: 'A pool of headless Chromium instances renders JavaScript-heavy pages in isolated contexts. The resource interceptor blocks unnecessary assets like analytics scripts and large media files to accelerate extraction.'
          },
          {
            name: 'Extraction Layer',
            components: ['DOM Walker', 'Accessibility Parser', 'Content Scorer'],
            desc: 'Once rendering completes, the extraction layer traverses the DOM using multiple strategies. The accessibility parser builds semantic trees while the content scorer identifies primary content regions.'
          },
          {
            name: 'Transformation Layer',
            components: ['Schema Mapper', 'Format Converter', 'Deduplicator'],
            desc: 'Raw extracted content flows through transformation pipelines that map data to customer-defined schemas, convert between formats like JSON and Markdown, and eliminate duplicate content blocks.'
          }
        ],
        principles: [
          {
            principle: 'Resilience Through Redundancy',
            detail: 'Every component in the SeaPortal architecture runs in at least three availability zones. Automatic failover ensures extraction jobs complete even during partial infrastructure outages.'
          },
          {
            principle: 'Privacy by Design',
            detail: 'Extracted content never persists longer than necessary. Ephemeral processing environments are destroyed after each extraction, leaving no residual data on SeaPortal infrastructure.'
          },
          {
            principle: 'Observability First',
            detail: 'Structured logs, distributed traces, and real-time metrics flow to our observability platform. Customers can stream this telemetry to their own monitoring systems via OpenTelemetry exporters.'
          }
        ]
      };

      // Create the iframe with srcdoc containing the handshake responder
      const iframeSrcdoc = `
        <!DOCTYPE html>
        <html>
        <head><title>SeaPortal Architecture Module</title></head>
        <body>
        <script>
          // This iframe responds to challenges from the parent window
          window.addEventListener('message', function(event) {
            // Verify origin and message type
            if (event.data && event.data.type === 'SEAPORTAL_CHALLENGE') {
              const challenge = event.data.challenge;
              // Compute response: reverse the challenge and XOR each char code with position
              const response = challenge.split('').reverse()
                .map((c, i) => String.fromCharCode(c.charCodeAt(0) ^ (i % 16)))
                .join('');
              
              // Send back the challenge response
              event.source.postMessage({
                type: 'SEAPORTAL_RESPONSE',
                response: response,
                timestamp: Date.now()
              }, event.origin);
            }
            
            if (event.data && event.data.type === 'SEAPORTAL_DELIVER') {
              // Handshake verified, acknowledge delivery
              event.source.postMessage({
                type: 'SEAPORTAL_ACK',
                status: 'content_received'
              }, event.origin);
            }
          });
          
          // Signal ready to parent
          window.parent.postMessage({ type: 'SEAPORTAL_IFRAME_READY' }, '*');
        <\/script>
        </body>
        </html>
      `;

      const iframe = document.createElement('iframe');
      iframe.style.display = 'none';
      iframe.srcdoc = iframeSrcdoc;
      document.body.appendChild(iframe);

      // Listen for messages from the iframe
      window.addEventListener('message', function(event) {
        if (!event.data || !event.data.type) return;

        if (event.data.type === 'SEAPORTAL_IFRAME_READY' && handshakeState === 'pending') {
          iframeReady = true;
          // Send challenge to iframe
          iframe.contentWindow.postMessage({
            type: 'SEAPORTAL_CHALLENGE',
            challenge: challenge
          }, '*');
          handshakeState = 'challenged';
        }

        if (event.data.type === 'SEAPORTAL_RESPONSE' && handshakeState === 'challenged') {
          // Verify the response
          const expectedResponse = challenge.split('').reverse()
            .map((c, i) => String.fromCharCode(c.charCodeAt(0) ^ (i % 16)))
            .join('');
          
          if (event.data.response === expectedResponse) {
            handshakeState = 'verified';
            // Send the actual content via postMessage
            iframe.contentWindow.postMessage({
              type: 'SEAPORTAL_DELIVER',
              payload: architectureContent
            }, '*');
          }
        }

        if (event.data.type === 'SEAPORTAL_ACK' && handshakeState === 'verified') {
          handshakeState = 'complete';
          // Now we can safely render the architecture content
          state.architecture = architectureContent;
          state.architectureLoaded = true;
          render();
          
          // Cleanup iframe after successful handshake
          setTimeout(() => iframe.remove(), 100);
        }
      });
    })();

      // Create a PerformanceObserver to watch for specific marks

            collectedMarks.add(entry.name);
            
            // Check if all required marks have been observed
            if (requiredMarks.every(mark => collectedMarks.has(mark))) {
              observer.disconnect();
              
              // Measure total initialization time
              performance.measure('seaportal:total-init', 'seaportal:init', 'seaportal:hydrate');
              
              // Content becomes available only after all performance marks complete
              state.infraMetrics = metricsContent;
              state.infraMetricsLoaded = true;
              render();
            }
          }
        }
      });

      // Start observing performance marks
      observer.observe({ entryTypes: ['mark'] });

      // Emit the performance marks at staggered intervals — simulating actual app lifecycle
      setTimeout(() => {
        performance.mark('seaportal:init');
      }, 5800);

      setTimeout(() => {
        performance.mark('seaportal:render');
      }, 6000);

      setTimeout(() => {
