<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Snapshot Test Page</title>
</head>
<body>
  <header>
    <nav id="main-nav" aria-label="Main navigation">
      <a href="/" class="nav-link">Home</a>
      <a href="/about" class="nav-link">About</a>
      <a href="/contact" class="nav-link">Contact</a>
    </nav>
  </header>

  <main id="content">
    <h1>Welcome to Snapshot Test</h1>
    <p>This is a non-interactive paragraph for testing.</p>
    
    <section aria-label="Actions">
      <button id="primary-btn" class="btn-primary">Click Me</button>
      <button class="btn-secondary">Secondary Action</button>
    </section>

    <form id="contact-form">
      <label for="name">Name:</label>
      <input type="text" id="name" placeholder="Enter your name">
      
      <label for="email">Email:</label>
      <input type="email" id="email" aria-label="Email address">
      
      <input type="checkbox" id="subscribe" checked>
      <label for="subscribe">Subscribe to newsletter</label>
      
      <textarea id="message" placeholder="Your message"></textarea>
      
      <select id="topic">
        <option value="general">General Inquiry</option>
        <option value="support">Support</option>
      </select>
    </form>

    <h2>Features</h2>
    <ul>
      <li>Feature one</li>
      <li>Feature two</li>
      <li>Feature three</li>
    </ul>

    <table>
      <thead>
        <tr>
          <th>Name</th>
          <th>Value</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td>Item A</td>
          <td>100</td>
        </tr>
        <tr>
          <td>Item B</td>
          <td>200</td>
        </tr>
      </tbody>
    </table>

    <img src="test.jpg" alt="Test image with alt text">
  </main>

  <aside>
    <h3>Sidebar</h3>
    <p>Additional content</p>
  </aside>

  <footer>
    <p>&copy; 2026 Test Site</p>
  </footer>
</body>
</html>
