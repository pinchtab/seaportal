<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Table Test Page</title>
</head>
<body>
    <h1>Data Tables</h1>
    
    <h2>Product Comparison</h2>
    <table border="1">
        <thead>
            <tr>
                <th>Product</th>
                <th>Price</th>
                <th>Availability</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>Widget A</td>
                <td>$29.99</td>
                <td>In Stock</td>
            </tr>
            <tr>
                <td>Widget B</td>
                <td>$49.99</td>
                <td>Out of Stock</td>
            </tr>
            <tr>
                <td>Widget C</td>
                <td>$39.99</td>
                <td>In Stock</td>
            </tr>
        </tbody>
    </table>
    
    <h2>Performance Metrics</h2>
    <table border="1">
        <tr>
            <th>Metric</th>
            <th>Q1</th>
            <th>Q2</th>
            <th>Q3</th>
        </tr>
        <tr>
            <td>Revenue</td>
            <td>$100K</td>
            <td>$120K</td>
            <td>$150K</td>
        </tr>
        <tr>
            <td>Users</td>
            <td>1000</td>
            <td>1500</td>
            <td>2200</td>
        </tr>
    </table>
</body>
</html>
